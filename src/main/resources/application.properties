# Expose only the health endpoint over HTTP
management.endpoints.web.exposure.include=health

# Optional: keep actuator base path at /actuator (default)
# management.endpoints.web.base-path=/actuator

# Disable banner for cleaner startup logs
spring.main.banner-mode=off

# Logging configuration
logging.level.root=INFO
logging.level.com.example.flightbooking=INFO
logging.level.com.example.flightbooking.service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

